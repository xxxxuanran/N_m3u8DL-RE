  # musl 静态 NativeAOT 构建: 两个架构均在对应 native runner 上, 通过手动 `docker run`
  # 启动 Alpine 容器进行编译 (不使用 GitHub Actions 的 `container:` 字段)。
  #
  # 为什么用 docker run 而不是 `container:`:
  #   GitHub Actions 不支持 ARM64 runner 配 Alpine 容器 (因为 JS-based actions 如
  #   actions/checkout 需要在容器内跑 Node, ARM64+Alpine 组合没内置 Node 二进制,
  #   见 https://github.com/actions/runner/issues/801)。但若把 actions/checkout
  #   留在 host 上跑, Alpine 容器只在编译这一步用 docker 启动, 整个限制就绕过去了。
  #
  # 为什么用 Alpine 容器而不是 host 原生编译:
  #   musl 纯净 rootfs 避免 host glibc 库 (如 /lib/{arch}-linux-gnu/libcrypto.a)
  #   被 ld.bfd 误抓进 musl 静态 PIE 链接, 产物 ABI 干净一致。
  build-linux:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
            rid: linux-musl-x64
            artifact: linux-x64
          - runner: ubuntu-24.04-arm
            image: mcr.microsoft.com/dotnet/sdk:10.0-alpine-arm64v8
            rid: linux-musl-arm64
            artifact: linux-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Build NativeAOT in Alpine container
        # openssl-libs-static 提供 libssl.a / libcrypto.a 用于 -static-pie 链接;
        # openssl-dev 只装 .so 动态库, 在 -static-pie 模式下 ld 会拒绝使用。
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          VERSION_INFO_SUFFIX: ${{ needs.prepare.outputs.version_info_suffix }}
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e VERSION \
            -e VERSION_INFO_SUFFIX \
            ${{ matrix.image }} \
            sh -c '
              set -eu
              apk add --no-cache clang build-base cmake zlib-dev openssl-dev openssl-libs-static linux-headers llvm lld git
              dotnet publish src/N_m3u8DL-RE \
                -p:Version="$VERSION" \
                -p:VersionInfoSuffix="$VERSION_INFO_SUFFIX" \
                -r ${{ matrix.rid }} \
                -c Release \
                -o /workspace/artifact
              # 把产物所有权交回 host runner user, 防止后续 host 上 tar 时遇到权限问题。
              chown -R "$(stat -c "%u:%g" /workspace)" /workspace/artifact
            '

      - name: Package [${{ matrix.artifact }}]
        run: |
          cd artifact
          tar -czvf ../N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}_${{ matrix.artifact }}_${{ needs.prepare.outputs.date }}.tar.gz N_m3u8DL-RE

      - name: Upload Artifact [${{ matrix.artifact }}]
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}_${{ matrix.artifact }}_${{ needs.prepare.outputs.date }}.tar.gz

  build-mac:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26-intel
            rid: osx-x64
            artifact: osx-x64
          - runner: macos-26
            rid: osx-arm64
            artifact: osx-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Set up dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - run: dotnet publish src/N_m3u8DL-RE -p:Version=${{ needs.prepare.outputs.version }} -p:VersionInfoSuffix=${{ needs.prepare.outputs.version_info_suffix }} -r ${{ matrix.rid }} -c Release -o artifact

      - name: Package [${{ matrix.artifact }}]
        run: |
          cd artifact
          tar -czvf ../N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}_${{ matrix.artifact }}_${{ needs.prepare.outputs.date }}.tar.gz N_m3u8DL-RE

      - name: Upload Artifact [${{ matrix.artifact }}]
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}_${{ matrix.artifact }}_${{ needs.prepare.outputs.date }}.tar.gz

  create_release:
    # 仅在 v* tag push 时发布 Release;手动 workflow_dispatch 仅做构建烟雾测试。
    if: github.event_name == 'push'
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - build-win-nt6_0-x86
      - build-windows
      - build-linux
      - build-mac
      # - build-android-bionic-x64
      # - build-android-bionic-arm64

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
