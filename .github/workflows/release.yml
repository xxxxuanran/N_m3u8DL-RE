name: Release Build

# 触发方式:
#   1) 推送 v* tag: 完整发布流程 (构建 + 创建 GitHub Release)。
#      向 main 等分支 push 提交不会运行本工作流。
#   2) workflow_dispatch (手动): 仅构建产物用于烟雾测试,不创建 Release。
#      可在 Actions 页面"Run workflow"触发,inputs.tag 仅用于 artifact 命名。
on:
  push:
    tags:
      - 'v*'
    branches-ignore:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Synthetic tag used for artifact naming (does not create a Release).'
        required: false
        default: 'v0.0.0-dispatch'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SDK_VERSION: "10.0.101"

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v'))
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      date: ${{ steps.meta.outputs.date }}
      version_info_suffix: ${{ steps.meta.outputs.version_info_suffix }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag metadata
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG:-v0.0.0-dispatch}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          DATE=$(TZ=Asia/Shanghai date +'%Y%m%d')
          HEAD_COMMIT=$(git rev-parse HEAD)
          SHORT_COMMIT=$(git rev-parse --short HEAD)
          RELEASE_DATE=$(TZ=Asia/Shanghai git log -1 --format=%cd --date=format:%Y%m%d "$HEAD_COMMIT")
          # workflow_dispatch 时不要求 tag 真实存在,直接使用 short commit 作为后缀。
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION_INFO_SUFFIX="${RELEASE_DATE}+${SHORT_COMMIT}"
          else
            TAG_COMMIT=$(git rev-parse "${TAG}^{commit}")
            if [ "$TAG_COMMIT" = "$HEAD_COMMIT" ]; then
              VERSION_INFO_SUFFIX="${RELEASE_DATE}+${TAG}"
            else
              VERSION_INFO_SUFFIX="${RELEASE_DATE}+${SHORT_COMMIT}"
            fi
          fi
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "date=${DATE}"
            echo "version_info_suffix=${VERSION_INFO_SUFFIX}"
          } >> "$GITHUB_OUTPUT"

  build-win-nt6_0-x86:
    runs-on: windows-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v6

      - name: Install zip
        run: choco install zip --no-progress --yes

      - name: Set up dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - run: powershell -Command "(Get-Content src/N_m3u8DL-RE/N_m3u8DL-RE.csproj) -replace '<TargetFramework>.*</TargetFramework>', '<TargetFramework>net10.0-windows</TargetFramework>' | Set-Content src/N_m3u8DL-RE/N_m3u8DL-RE.csproj"
      - run: dotnet add src/N_m3u8DL-RE/N_m3u8DL-RE.csproj package YY-Thunks --version 1.1.4
      - run: dotnet add src/N_m3u8DL-RE/N_m3u8DL-RE.csproj package VC-LTL --version 5.1.1
      - run: dotnet publish src/N_m3u8DL-RE -p:TargetPlatformMinVersion=6.0 -p:Version=${{ needs.prepare.outputs.version }} -p:VersionInfoSuffix=${{ needs.prepare.outputs.version_info_suffix }} -r win-x86 -c Release -o artifact

      - name: Package [win-x86]
        run: |
          cd artifact
          zip ../N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}_win-NT6.0-x86_${{ needs.prepare.outputs.date }}.zip N_m3u8DL-RE.exe

      - name: Upload Artifact [win-x86]
        uses: actions/upload-artifact@v6
        with:
          name: win-NT6.0-x86
          path: N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}_win-NT6.0-x86_${{ needs.prepare.outputs.date }}.zip

  build-windows:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
            artifact: win-x64
          - runner: windows-11-arm
            rid: win-arm64
            artifact: win-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install zip
        run: choco install zip --no-progress --yes

      - name: Set up dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - run: dotnet publish src/N_m3u8DL-RE -p:Version=${{ needs.prepare.outputs.version }} -p:VersionInfoSuffix=${{ needs.prepare.outputs.version_info_suffix }} -r ${{ matrix.rid }} -c Release -o artifact

      - name: Package [${{ matrix.artifact }}]
        run: |
          cd artifact
          zip ../N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}_${{ matrix.artifact }}_${{ needs.prepare.outputs.date }}.zip N_m3u8DL-RE.exe

      - name: Upload Artifact [${{ matrix.artifact }}]
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: N_m3u8DL-RE_${{ needs.prepare.outputs.tag }}_${{ matrix.artifact }}_${{ needs.prepare.outputs.date }}.zip

